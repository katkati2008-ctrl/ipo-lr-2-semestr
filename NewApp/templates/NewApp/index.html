<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Главная</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
      <style>
         *{margin:0;padding:0;box-sizing:border-box;font-family:system-ui,sans-serif;}
        body{padding:15px;max-width:1200px;margin:0 auto;background:#fff;}
        
        /* всё в одну строку */
        .top-line{display:flex;align-items:center;justify-content:space-between;gap:20px;padding:12px 0;}
        .logo{font-size:24px;font-weight:700;color:#0f1e3d;}
        .menu{display:flex;gap:18px;}
        .menu a{color:#2b3b5c;text-decoration:none;font-size:15px;}
        .contact{display:flex;gap:18px;color:#4a5a7a;font-size:14px;}
        .contact i{color:#0f1e3d;width:18px;}
        
        .hero{display:flex;align-items:center;justify-content:space-between;margin:25px 0;padding:15px 0;}
        .hero h1{font-size:36px;color:#0f1e3d;}
        .hero p{color:#4a5a7a;margin:8px 0 15px;}
        .btn{background:#0f1e3d;color:#fff;padding:10px 25px;border-radius:30px;text-decoration:none;display:inline-flex;align-items:center;gap:8px;}
        
        .cats{display:flex;gap:8px;margin:15px 0;}
        .cats a{background:#f2f5fa;padding:8px 15px;border-radius:30px;text-decoration:none;color:#0f1e3d;display:flex;align-items:center;gap:6px;font-size:14px;}
        
        .footer{display:flex;align-items:center;justify-content:space-between;padding:15px 0;border-top:1px solid #e9eef3;margin-top:20px;color:#5b6b89;font-size:13px;}
        .social{display:flex;gap:12px;}
        .social i{color:#0f1e3d;font-size:16px;}
    </style>
</head>
<body>
    <div class="card">
        <h1>Главная страница сайта</h1>
        <hr>
        <p><h2><a href="/author/" class="btn btn-light">Информация об авторе</a></h2></p>
        <p><h2><a href="/about/" class="btn btn-light">Информация о магазине</a></h2></p>
        <p><h2><a href="/catalog/" class="btn">Перейти в каталог магазина<i class="fas fa-arrow-right"></i></a></h2></p>
    </div>
    <script></script>
</body>
</html>
