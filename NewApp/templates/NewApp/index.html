<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Главная</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
      <style>
       body { margin: 20px; font-family: system-ui, sans-serif; background: rgb(234, 177, 252); }
        .row { display: flex; gap: 20px; align-items: center; justify-content: center; flex-wrap: wrap; }
        a { text-decoration: none; color: #710492; }
        button { background: #000; color: rgb(230, 170, 238); border: none; padding: 8px 20px; border-radius: 20px; cursor: pointer; font-size: 14px; }
        .btn-outline { background: rgb(71, 2, 104); color: #4e0272; border: 1px solid #420574; }
        h1 { text-align: center; margin-top: 50px; font-weight: normal; }
        p { text-align: center; color: #555; }
        h2 { text-align: center; margin-top: 50px; font-weight: normal; }
    </style>
</head>
<body>
    <div class="card">
        <h1>Главная страница сайта</h1>
        <hr>
        <p><h2><a href="/author/" class="btn btn-light">Информация об авторе</a></h2></p>
        <p><h2><a href="/about/" class="btn btn-light">Информация о магазине</a></h2></p>
        <p><h2><a href="/catalog/" class="btn">Перейти в каталог магазина<i class="fas fa-arrow-right"></i></a></h2></p>
        <p><h2><a href="/cart/" class="btn btn-light">Перейти в корзину</a></h2></p>
        
         
        <div class="nav-right">

            {% if user.is_authenticated %}
                <span class="user-info">{{ user.username }}</span>
                <form method="post" action="{% url 'logout' %}" style="display: inline;">
                    {% csrf_token %}
                    <input type="hidden" name="next" value="{% url 'main' %}">
                    <button type="submit" class="btn-logout">Выйти</button>
                </form>
            {% else %}
                <a href="{% url 'login' %}" class="btn-logout" style="border:1px solid ">Войти</a>
                <a href="{% url 'register' %}" class="btn-logout" style="border:1px solid ">Регистрация</a>
            {% endif %}
        </div>
    </div>
    <script></script>
</body>
</html>
