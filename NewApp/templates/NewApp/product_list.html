    <title>Каталог</title>
    <style>
     body {
            background: #e7d4f7;  
        }
    h1 {
             color: #34024b;
        }
         button { background: #2d0157; color: rgb(230, 170, 238); border: none; padding: 8px 20px; border-radius: 20px; cursor: pointer; font-size: 14px; }
        select { background: #2d0157; color: rgb(230, 170, 238); border: none; padding: 8px 20px; border-radius: 20px; cursor: pointer; font-size: 14px; }
        p {color: rgb(51, 3, 88);}
</style>
<h1>Каталог</h1>

<form method="get">
    <input type="text" name="search" placeholder="Поиск" value="{{ request.GET.search|default:'' }}">
    
    <select name="category">
        <option value="">Все категории</option>
        {% for categ in category %}
        <option value="{{ categ.id }}" {% if request.GET.category == categ.id|stringformat:"i" %}selected{% endif %}>
            {{ categ.name }}
        </option>
        {% endfor %}
    </select>
    
    <select name="manufacturer">
        <option value="">Все производители</option>
        {% for manuf in manufacturer %}
        <option value="{{ manuf.id }}" {% if request.GET.manufacturer == manuf.id|stringformat:"i" %}selected{% endif %}>
            {{ manuf.name }}
        </option>
        {% endfor %}
    </select>
    
    <button type="submit">Применить</button>   

</form>

<a href="{% url 'cart_view'%}"><button type="submit">Перейти к корзине</button></a>

<div style="display: grid;  background: #e9e0f0; gap: 10px; margin-top: 20px;">
    {% for p in products %}
    <div style="border:1px solid #938dce; padding:10px">
        <h3><a href="{% url 'product_detail' p.id %}">{{ p.name }}</a></h3>
        <p>{{ p.category.name }} / {{ p.manufacturer.name }}</p>
        <p><strong>{{ p.price }} руб</strong></p>
        <p>В наличии: {{ p.quantity }}</p>
        {% if user.is_authenticated and p.quantity > 0 %}
            <a href="{% url 'add_to_cart' p.id %}"><button type="submit">В корзину</button></a>
        {% endif %}
    </div>
    {% empty %}
    <p>Товаров нет</p>
    {% endfor %}
</div>
